# Adaptive global behavior
# - anomaly_mult: baseline multiplier in percent (e.g. 280 => 2.8x baseline)
# - score: suspicion score threshold before counting an offense
# - block_ttl: temporary block duration after repeated offenses
# - offenses: suspicious windows before auto-mitigation block
# - auto: 1 enables auto mitigation, 0 disables
# - warmup: learning windows before scoring starts
# - ack_ratio: ACK-only ratio threshold for ACK flood signature
# - rst_ratio: TCP RST ratio threshold for reset-spam signature
# - syn_ratio: TCP SYN ratio threshold for SYN flood signature
# - dns_ratio: DNS-like response ratio threshold inside UDP traffic
# - dns_min_bytes: minimum packet size for DNS amplification-like responses
# - udp_spread: destination port spread threshold for random UDP spray
# - scan_spread: destination port spread threshold for scan-like behavior
# - udp_amp_ratio: ratio threshold for known reflection source UDP ports
# - icmp_ratio: ICMP ratio threshold for ICMP flood behavior
# - block_min_score: score must reach this value before blocking is allowed
# - block_min_reasons: number of simultaneous reasons before blocking is allowed
# - emergency_cooldown_sec: stricter scoring period after an emergency drop
# - service_relax_dns_pct/http_pct/https_pct/ntp_pct: service-aware threshold relaxation

default anomaly_mult=280 score=140 block_ttl=120 offenses=3 auto=1 warmup=3 ack_ratio=88 rst_ratio=70 syn_ratio=65 dns_ratio=60 dns_min_bytes=700 udp_spread=12 scan_spread=18 udp_amp_ratio=45 icmp_ratio=55 block_min_score=220 block_min_reasons=3 emergency_cooldown_sec=30 service_relax_dns_pct=20 service_relax_http_pct=12 service_relax_https_pct=18 service_relax_ntp_pct=0

